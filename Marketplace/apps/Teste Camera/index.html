<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
  />

  <title>Camera Bridge Ultra Fast</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #preview-container {
      position: relative;
      flex: 1;
      background: #111;
      overflow: hidden;
    }

    #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;

      image-rendering: auto;
      backface-visibility: hidden;
      transform: translateZ(0);

      opacity: 0;
      transition: opacity 0.12s linear;
    }

    #preview.ready {
      opacity: 1;
    }

    #status {
      position: absolute;
      top: 10px;
      left: 10px;

      padding: 6px 10px;
      border-radius: 10px;

      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 13px;

      z-index: 10;
    }

    #controls {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: #181818;
      border-top: 1px solid #333;
    }

    button {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 14px;

      background: #2d2d2d;
      color: white;

      font-size: 15px;
      font-weight: bold;

      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .green {
      background: #1f8f47;
    }

    .red {
      background: #b83232;
    }

    .blue {
      background: #2c63d6;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="preview-container">
      <img id="preview" />
      <div id="status">Idle 💤</div>
    </div>

    <div id="controls">
      <button class="green" onclick="startStream()">
        START
      </button>

      <button class="red" onclick="stopStream()">
        STOP
      </button>

      <button class="blue" onclick="takePhoto()">
        PHOTO
      </button>
    </div>
  </div>

  <script>
    const preview = document.getElementById('preview');
    const statusEl = document.getElementById('status');

    let lastFrame = null;
    let rendering = false;
    let streamStarted = false;

    /*
      ⚡ Render pipeline ultra leve:
      - evita repaint desnecessário
      - evita flood da UI thread
      - usa requestAnimationFrame
      - ignora frames repetidos
    */

    function renderLoop() {
      if (lastFrame && !rendering) {
        rendering = true;

        requestAnimationFrame(() => {
          preview.src = lastFrame;

          if (!preview.classList.contains('ready')) {
            preview.classList.add('ready');
          }

          rendering = false;
        });
      }

      requestAnimationFrame(renderLoop);
    }

    requestAnimationFrame(renderLoop);

    function updateStatus(text) {
      statusEl.textContent = text;
    }

    function send(data) {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(
          JSON.stringify(data)
        );
      }
    }

    function startStream() {
      streamStarted = true;

      updateStatus('Opening stream... 📷');

      send({
        module: 'camera',
        action: 'START_STREAM',
        params: {},
      });
    }

    function stopStream() {
      streamStarted = false;

      preview.src = '';
      preview.classList.remove('ready');

      updateStatus('Stopped 🛑');

      send({
        module: 'camera',
        action: 'STOP_STREAM',
        params: {},
      });
    }

    function takePhoto() {
      updateStatus('Capturing... 📸');

      send({
        module: 'camera',
        action: 'TAKE_PHOTO',
        params: {
          saveToGallery: false,
        },
      });
    }

    /*
      🚀 Bridge otimizada:
      - parsing único
      - sem console spam
      - sem innerHTML
      - sem recriar nodes
      - sem canvas
    */

    function handleBridgeMessage(event) {
      try {
        const payload =
          typeof event.data === 'string'
            ? JSON.parse(event.data)
            : event.data;

        if (!payload || payload.module !== 'camera') {
          return;
        }

        switch (payload.type) {
          case 'FRAME':
            lastFrame = payload.data;

            if (streamStarted) {
              updateStatus('Streaming ⚡');
            }
            break;

          case 'PHOTO_RESULT':
            preview.src = payload.data;
            updateStatus('Photo captured ✅');
            break;

          case 'ERROR':
            updateStatus(payload.message || 'Camera error ❌');
            break;
        }
      } catch (err) {
        updateStatus('Bridge parse error 💥');
      }
    }

    /*
      Android WebView bridge
    */
    document.addEventListener(
      'message',
      handleBridgeMessage
    );

    /*
      iOS bridge
    */
    window.addEventListener(
      'message',
      handleBridgeMessage
    );
  </script>
</body>
</html>
