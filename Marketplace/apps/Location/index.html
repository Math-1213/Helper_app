<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Questionário Totalmente Inofensivo</title>

    <style>
      body {
        margin: 0;
        background: #0d0d0d;
        color: white;
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      #app {
        width: 90%;
        max-width: 600px;
      }

      h1 {
        font-size: 32px;
        margin-bottom: 30px;
      }

      .question {
        font-size: 24px;
        margin-bottom: 30px;
        line-height: 1.4;
      }

      button {
        width: 100%;
        padding: 16px;
        margin-bottom: 15px;
        border: none;
        border-radius: 12px;
        background: #1e1e1e;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: #333;
      }

      #reveal {
        margin-top: 30px;
        color: #00ff99;
        line-height: 1.8;
        font-size: 18px;
        opacity: 0;
        transition: 0.5s;
      }

      .glitch {
        animation: glitch 0.2s infinite;
      }

      @keyframes glitch {
        0% {
          transform: translate(0px);
        }
        25% {
          transform: translate(-2px, 1px);
        }
        50% {
          transform: translate(2px, -1px);
        }
        75% {
          transform: translate(-1px, -2px);
        }
        100% {
          transform: translate(1px, 2px);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Perguntas Sem Consequências™</h1>

      <div class="question" id="question"></div>

      <div id="answers"></div>

      <div id="reveal"></div>
    </div>

    <script>
      const questions = [
        {
          text: "Qual animal entenderia impostos?",
          answers: ["Capivara", "Corvo", "Peixe espada", "Cavalo medieval"],
        },

        {
          text: "Qual cor teria gosto de quinta-feira?",
          answers: [
            "Verde escuro",
            "Azul rádioativo",
            "Bege emocional",
            "Roxo administrativo",
          ],
        },

        {
          text: "Qual objeto venceria o Sol numa discussão?",
          answers: [
            "Um microondas",
            "Uma escada",
            "Uma panela",
            "Uma impressora HP",
          ],
        },
      ];

      let currentQuestion = 0;

      let gpsData = null;
      let addressData = null;

      const reveal = document.getElementById("reveal");

      // ======================================
      // PEGAR LOCALIZAÇÃO
      // ======================================

      function requestLocation() {
        sendToApp({
          module: "location",
          action: "GET_CURRENT_LOCATION",
          params: {},
        });
      }

      // ======================================
      // RECEBER BRIDGE
      // ======================================

      window.addEventListener("message", receiveMessage);
      document.addEventListener("message", receiveMessage);

      async function receiveMessage(event) {
        try {
          const msg =
            typeof event.data === "string"
              ? JSON.parse(event.data)
              : event.data;

          console.log(msg);

          if (msg.module === "location" && msg.type === "LOCATION_DATA") {
            gpsData = msg.data;

            await reverseGeocode(gpsData.latitude, gpsData.longitude);

            renderQuestion();
          }
        } catch (err) {
          console.error(err);
        }
      }

      // ======================================
      // REVERSE GEOCODING
      // ======================================

      async function reverseGeocode(lat, lon) {
        const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;

        const response = await fetch(url);

        const data = await response.json();

        addressData = data.address;

        console.log(addressData);
      }

      // ======================================
      // RENDER
      // ======================================

      function renderQuestion() {
        const q = questions[currentQuestion];

        document.getElementById("question").innerText = q.text;

        const answersDiv = document.getElementById("answers");

        answersDiv.innerHTML = "";

        q.answers.forEach((answer) => {
          const btn = document.createElement("button");

          btn.innerText = answer;

          btn.onclick = () => chooseAnswer();

          answersDiv.appendChild(btn);
        });
      }

      // ======================================
      // ESCOLHA
      // ======================================

      function chooseAnswer() {
        reveal.style.opacity = 1;

        if (currentQuestion === 0) {
          reveal.innerHTML = `Interessante... alguém próximo de <b>${addressData.city || "alguma cidade"}</b> diria isso.`;
        }

        if (currentQuestion === 1) {
          reveal.innerHTML = `Curioso.\nExiste um padrão vindo da região de <b>${addressData.suburb || "algum bairro"}</b>.`;
        }

        if (currentQuestion === 2) {
          reveal.classList.add("glitch");

          reveal.innerHTML = `
      Precisão estimada: ${Math.round(gpsData.accuracy)} metros.<br><br>

      CEP identificado:
      <b>${addressData.postcode || "desconhecido"}</b><br><br>

      Rua provável:
      <b>${addressData.road || "??? "}</b>
      `;
        }

        currentQuestion++;

        if (currentQuestion < questions.length) {
          setTimeout(() => {
            renderQuestion();
          }, 2500);
        }
      }

      // ======================================
      // BRIDGE
      // ======================================

      function sendToApp(data) {
        const payload = JSON.stringify(data);

        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(payload);
        }

        console.log("SEND:", payload);
      }

      // ======================================

      requestLocation();
    </script>
  </body>
</html>
